<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #f0f0f0; margin: 0; }
  .footer-border {
    margin-top: 50px;
    background: #b91c1c;
    height: 150px;
    border-radius: 50% 50% 0 0 / 100px 100px 0 0;
  }
  .footer-clip {
    margin-top: 50px;
    background: #4a0404;
    height: 150px;
    clip-path: ellipse(75% 100px at 50% 100px);
  }
</style>
</head>
<body>
  <div class="footer-border"></div>
  <div class="footer-clip"></div>
</body>
</html>
